<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Access Portal</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== Background ===== */
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    background: radial-gradient(circle at center,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow:hidden;
}

/* ===== Portal Screen ===== */
.portal{
    text-align:center;
}

.portal h1{
    font-size:40px;
    margin-bottom:10px;
}

.portal p{
    color:#94a3b8;
    margin-bottom:40px;
}

/* Glowing Core */
.quantum-core{
    width:140px;
    height:140px;
    border-radius:50%;
    background: radial-gradient(circle,#38bdf8,#0284c7,#020617);
    margin:auto;
    box-shadow:0 0 40px #38bdf8, 0 0 80px #0ea5e9;
    cursor:pointer;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
    100%{ transform:scale(1); }
}

/* ===== Login Card ===== */
.login-container{
    display:none;
    background:#020617;
    padding:35px;
    border-radius:18px;
    box-shadow:0 0 40px rgba(56,189,248,0.5);
    width:320px;
    text-align:center;
}

.login-container h2{
    margin-bottom:20px;
}

.login-container input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    font-size:15px;
}

/* ===== PASSWORD TOGGLE ===== */

.password-wrapper{
    position:relative;
    width:100%;
}

.password-wrapper input{
    padding-right:120px;
}

/* toggle button */
.quantum-toggle{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    background:rgba(37,99,235,0.15);
    padding:5px 10px;
    border-radius:20px;
    border:1px solid rgba(56,189,248,0.4);
}

/* glowing dot */
.quantum-dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#38bdf8;
    box-shadow:0 0 10px #38bdf8, 0 0 20px #38bdf8;
}

/* text */
#toggleText{
    font-size:12px;
    color:#38bdf8;
    font-weight:600;
    margin-top:10px;
}

/* active */
.quantum-toggle.active{
    background:rgba(34,197,94,0.2);
    border:1px solid #22c55e;
}

.quantum-toggle.active .quantum-dot{
    background:#22c55e;
    box-shadow:0 0 12px #22c55e, 0 0 25px #22c55e;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#38bdf8,#2563eb);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<!-- STEP 1 -->

<div class="portal" id="portalScreen">
    <h1>Quantum Access Portal</h1>
    <p>Click the Quantum Core</p>
    <div class="quantum-core" onclick="activateCore()"></div>
</div>

<!-- STEP 2 LOGIN -->

<div class="login-container" id="loginBox">
    <h2>Quantum Login</h2>

```
<input type="text" id="username" placeholder="Username">

<div class="password-wrapper">
    <input type="password" id="password" placeholder="Password">

    <div class="quantum-toggle" onclick="togglePassword()">
        <div class="quantum-dot"></div>
        <span>CORE</span>
    </div>
</div>

<div id="toggleText">LOCKED</div>

<button onclick="login()">Enter System</button>
```

</div>

<script>

function activateCore(){
    document.getElementById("portalScreen").style.display="none";
    document.getElementById("loginBox").style.display="block";
}

/* SHOW PASSWORD CORE */
function togglePassword(){
    const pass = document.getElementById("password");
    const toggle = document.querySelector(".quantum-toggle");
    const text = document.getElementById("toggleText");

    if(pass.type==="password"){
        pass.type="text";
        toggle.classList.add("active");
        text.innerText="CORE ACTIVE";
    }else{
        pass.type="password";
        toggle.classList.remove("active");
        text.innerText="LOCKED";
    }
}

/* LOGIN */
function login(){
    const user=document.getElementById("username").value;
    const pass=document.getElementById("password").value;

    if(user==="quantum" && pass==="1234"){
        localStorage.setItem("quantum_user",user);
        localStorage.setItem("login_time",new Date().toLocaleString());
        window.location.href="dashboard.html";
    }else{
        alert("Invalid Credentials");
    }
}

</script>

</body>
</html>
