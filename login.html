<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Quantum Valley</title>

<link rel="stylesheet" href="style.css">

<style>

/* Center login page */
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:radial-gradient(circle at center,#0f172a,#020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* glowing circle */
.core{
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(circle,#38bdf8,#0ea5e9,transparent 70%);
    filter:blur(18px);
    top:90px;
}

/* login box */
.login-box{
    width:340px;
    background:#020617;
    padding:30px;
    border-radius:16px;
    box-shadow:0 0 35px rgba(56,189,248,0.35);
    text-align:center;
    position:relative;
}

/* heading */
.login-box h2{
    margin-bottom:20px;
    color:#38bdf8;
}

/* inputs */
.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #1e293b;
    background:#020617;
    color:white;
    outline:none;
}

/* login button */
.login-box button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#38bdf8,#2563eb);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-box button:hover{
    transform:scale(1.05);
}

/* password eye */
.password-box{
    position:relative;
}

.password-box input{
    padding-right:45px;
}

.toggle-password{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
    color:#38bdf8;
}

.toggle-password:hover{
    color:white;
}

/* status text */
#status{
    margin:8px 0;
    font-weight:bold;
    letter-spacing:1px;
}

</style>
</head>

<body>

<div class="core"></div>

<div class="login-box">

<h2>Quantum Login</h2>

<form onsubmit="return loginUser()">

<input type="text" id="username" placeholder="Username" required>

<div class="password-box">
    <input type="password" id="password" placeholder="Password" required>
    <span class="toggle-password" onclick="togglePassword()">👁</span>
</div>

<p id="status">LOCKED</p>

<button type="submit">Enter System</button>

</form>
</div>

<script>

/* show / hide password */
function togglePassword(){
    const pass = document.getElementById("password");
    pass.type = (pass.type === "password") ? "text" : "password";
}

/* login system */
function loginUser(){

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    /* demo credentials */
    if(username === "admin" && password === "1234"){

        localStorage.setItem("quantum_user", username);

        const now = new Date();
        localStorage.setItem("login_time", now.toLocaleString());

        document.getElementById("status").innerText="ACCESS GRANTED";

        setTimeout(()=>{
            window.location.href="dashboard.html";
        },1000);

        return false;
    }
    else{
        document.getElementById("status").innerText="ACCESS DENIED";
        return false;
    }
}

</script>

</body>
</html>
