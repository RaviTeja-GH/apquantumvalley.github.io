<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Access Portal</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== Background ===== */
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    background: radial-gradient(circle at center,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow:hidden;
}

/* ===== Portal Screen ===== */
.portal{
    text-align:center;
}

.portal h1{
    font-size:40px;
    margin-bottom:10px;
}

.portal p{
    color:#94a3b8;
    margin-bottom:40px;
}

/* Glowing Core */
.quantum-core{
    width:140px;
    height:140px;
    border-radius:50%;
    background: radial-gradient(circle,#38bdf8,#0284c7,#020617);
    margin:auto;
    box-shadow:0 0 40px #38bdf8, 0 0 80px #0ea5e9;
    cursor:pointer;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
    100%{ transform:scale(1); }
}

/* ===== Login Card ===== */
.login-container{
    display:none;
    background:#020617;
    padding:35px;
    border-radius:18px;
    box-shadow:0 0 40px rgba(56,189,248,0.5);
    width:320px;
    text-align:center;
}

.login-container h2{
    margin-bottom:20px;
}

.login-container input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    font-size:15px;
}

/* Status Text */
.status{
    margin:15px 0;
    font-weight:bold;
    letter-spacing:2px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#38bdf8,#2563eb);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<!-- STEP 1 PORTAL -->
<div class="portal" id="portalScreen">
    <h1>Quantum Access Portal</h1>
    <p>Activate the Core to Continue</p>

    <div class="quantum-core" onclick="activateCore()"></div>
</div>

<!-- STEP 2 LOGIN -->
<div class="login-container" id="loginBox">
    <h2>Quantum Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <div class="status" id="toggleText">LOCKED</div>

    <button onclick="login()">Enter System</button>
</div>

<script>

/* Show login after clicking core */
function activateCore(){
    document.getElementById("portalScreen").style.display="none";
    document.getElementById("loginBox").style.display="block";
    document.getElementById("toggleText").innerText="CORE ACTIVE";
}

/* Login check */
function login(){

    const user=document.getElementById("username").value;
    const pass=document.getElementById("password").value;

    if(user==="quantum" && pass==="1234"){
        localStorage.setItem("quantum_user",user);
        localStorage.setItem("login_time", new Date().toLocaleString());
        window.location.href="dashboard.html";
    }else{
        alert("Invalid Credentials");
    }
}

</script>

</body>
</html>
