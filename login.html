<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Login</title>
<link rel="stylesheet" href="style.css">

<style>

/* page background */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:radial-gradient(circle at center,#0f172a,#020617);
    color:white;
}

/* login card */
.login-box{
    width:320px;
    padding:35px 30px;
    border-radius:18px;
    background:#020617;
    box-shadow:0 0 35px #22d3ee;
    text-align:center;
}

/* title */
.login-box h2{
    color:#67e8f9;
    margin-bottom:25px;
}

/* inputs */
.input-group{
    position:relative;
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#020617;
    color:white;
    outline:none;
    font-size:15px;
}

/* ===== QUANTUM CORE BUTTON ===== */

.quantum-toggle{
    width:60px;
    height:60px;
    border-radius:50%;
    margin:15px auto;
    cursor:pointer;
    background:radial-gradient(circle,#0ea5e9,#020617);
    box-shadow:0 0 20px #22d3ee;
    transition:0.4s;
}

.quantum-toggle.active{
    box-shadow:0 0 35px #22d3ee,0 0 60px #06b6d4;
    transform:scale(1.1);
}

/* status text */
#toggleText{
    font-weight:bold;
    margin-top:10px;
    letter-spacing:2px;
}

/* login button */
.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#38bdf8,#2563eb);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
}

.login-btn:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Quantum Login</h2>

<form onsubmit="return loginUser()">

<div class="input-group">
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<!-- QUANTUM CORE BUTTON -->
<div class="quantum-toggle" onclick="togglePassword()"></div>

<p id="toggleText">LOCKED</p>

<button class="login-btn" type="submit">Enter System</button>

</form>

</div>

<script>

/* ===== PASSWORD TOGGLE ===== */
function togglePassword(){
    const pass = document.getElementById("password");
    const toggle = document.querySelector(".quantum-toggle");
    const text = document.getElementById("toggleText");

    if(pass.type === "password"){
        pass.type = "text";
        toggle.classList.add("active");
        text.innerText = "CORE ACTIVE";
    }else{
        pass.type = "password";
        toggle.classList.remove("active");
        text.innerText = "LOCKED";
    }
}

/* ===== LOGIN SYSTEM ===== */
function loginUser(){

    const username = document.getElementById("username").value;

    localStorage.setItem("quantum_user", username);

    const now = new Date();
    localStorage.setItem("login_time", now.toLocaleString());

    window.location.href = "dashboard.html";

    return false;
}

</script>

</body>
</html>
