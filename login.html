<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Access Portal</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== Background ===== */
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    background: radial-gradient(circle at center,#0f172a,#020617);
    color:white;
}

/* ===== Portal Screen ===== */
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    background: radial-gradient(circle at center,#0f172a,#020617);
    color:white;
}

.portal h1{
    font-size:40px;
    margin-bottom:10px;
}

.portal p{
    color:#94a3b8;
    margin-bottom:40px;
}

/* Glowing Core */
.quantum-core{
    width:140px;
    height:140px;
    border-radius:50%;
    background: radial-gradient(circle,#38bdf8,#0284c7,#020617);
    margin:auto;
    box-shadow:0 0 40px #38bdf8, 0 0 80px #0ea5e9;
    cursor:pointer;
    animation:pulse 2s infinite;
    position:relative;
    z-index:5;
    overflow:hidden;
}

@keyframes pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
    100%{ transform:scale(1); }
}

/* ===== Login Card ===== */
.login-container{
    display:none;
    background:#020617;
    padding:35px;
    border-radius:18px;
    box-shadow:0 0 40px rgba(56,189,248,0.5);
    width:320px;
    text-align:center;
    position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.login-container h2{
    margin-bottom:20px;
}

.login-container input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    font-size:15px;
}

/* ===== PASSWORD TOGGLE ===== */

.password-wrapper{
    position:relative;
    width:100%;
}

.password-wrapper input{
    padding-right:120px;
}

/* toggle button */
.quantum-toggle{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    background:rgba(37,99,235,0.15);
    padding:5px 10px;
    border-radius:20px;
    border:1px solid rgba(56,189,248,0.4);
}

/* glowing dot */
.quantum-dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#38bdf8;
    box-shadow:0 0 10px #38bdf8, 0 0 20px #38bdf8;
}

/* text */
#toggleText{
    font-size:12px;
    color:#38bdf8;
    font-weight:600;
    margin-top:10px;
}

/* active */
.quantum-toggle.active{
    background:rgba(34,197,94,0.2);
    border:1px solid #22c55e;
}

.quantum-toggle.active .quantum-dot{
    background:#22c55e;
    box-shadow:0 0 12px #22c55e, 0 0 25px #22c55e;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#38bdf8,#2563eb);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
    /* ===== QUANTUM PORTAL ANIMATION ===== */

.portal-effect{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
    opacity:0;
}

.portal-effect.active{
    opacity:1;
}

/* expanding rings */

.ring{
    position:absolute;
    left:50%;
    top:50%;
    width:140px;
    height:140px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    border:2px solid #38bdf8;
    box-shadow:0 0 25px #38bdf8, 0 0 70px #0ea5e9;
    animation:portalExpand 1.3s ease-out forwards;
}

.ring1{ width:120px; height:120px; }
.ring2{ width:120px; height:120px; animation-delay:.2s; }
.ring3{ width:120px; height:120px; animation-delay:.4s; }

@keyframes portalExpand{
    0%{
        transform:translate(-50%,-50%) scale(1);
        opacity:1;
    }
    70%{
        opacity:.9;
    }
    100%{
        transform:translate(-50%,-50%) scale(14);
        opacity:0;
    }
}

/* white flash (portal burst) */
.flash{
    position:absolute;
    width:200px;
    height:200px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.9),rgba(56,189,248,.4),transparent);
    animation:portalFlash .8s ease-out forwards;
}

@keyframes portalFlash{
    0%{ transform:scale(.5); opacity:1; }
    100%{ transform:scale(6); opacity:0; }
}
/* ===== LIGHTNING EFFECT ===== */

/* energy ring around core */
.quantum-core::before{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:160px;
    height:160px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    border:2px solid rgba(56,189,248,0.5);
    animation:ringWave 1.6s infinite;
}

@keyframes ringWave{
    0%{
        transform:scale(0.8);
        opacity:0.9;
    }
    70%{
        transform:scale(1.4);
        opacity:0;
    }
    100%{
        opacity:0;
    }
}

/* LIGHTNING BOLTS */
.lightning{
    position:absolute;
    left:50%;
    top:50%;
    width:4px;
    height:220px;
    transform:translate(-50%,-50%) rotate(20deg);
    background:linear-gradient(#67e8f9, white, #0ea5e9);
    box-shadow:
        0 0 12px #67e8f9,
        0 0 30px #38bdf8,
        0 0 80px #0ea5e9;
    opacity:0;
    z-index:1;
    pointer-events:none;
}

/* appear when portal activates */
#portalScreen.active .lightning{
    animation:zap 0.35s linear infinite;
    opacity:1;
}

@keyframes zap{
    0%{opacity:0; transform:translateY(-40px) rotate(15deg);}
    40%{opacity:1;}
    80%{opacity:0.3;}
    100%{opacity:0;}
}

/* flash screen */
.flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
}

.flash.active{
    animation:flashbang 0.4s;
}

@keyframes flashbang{
    0%{opacity:0;}
    50%{opacity:0.9;}
    100%{opacity:0;}
}
    @keyframes shake{
    0%{ transform:translate(0px,0px); }
    25%{ transform:translate(3px,-3px); }
    50%{ transform:translate(-3px,3px); }
    75%{ transform:translate(2px,-2px); }
    100%{ transform:translate(0px,0px); }
}
</style>

</head>

<body>

<!-- STEP 1 -->

<div class="portal" id="portalScreen">
    <h1>Quantum Access Portal</h1>
    <p>Click the Quantum Core</p>
    <div class="quantum-core" onclick="activateCore()"></div>
    <!-- PORTAL ENERGY RINGS -->
<div class="portal-effect" id="portalEffect">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="flash"></div>
</div>
   <!-- lightning bolts -->
<div class="lightning" style="left:45%; top:40%;"></div>
<div class="lightning" style="left:52%; top:45%;"></div>
<div class="lightning" style="left:48%; top:50%;"></div>

<!-- screen flash -->
<div class="flash" id="flash"></div>
    </div>

<!-- STEP 2 LOGIN -->

<div class="login-container" id="loginBox">
    <h2>Quantum Login</h2>

<input type="text" id="username" placeholder="Username">

<div class="password-wrapper">
    <input type="password" id="password" placeholder="Password">

    <div class="quantum-toggle" onclick="togglePassword()">
        <div class="quantum-dot"></div>
        <span>CORE</span>
    </div>
</div>

<div id="toggleText">LOCKED</div>

<button onclick="login()">Enter System</button>

</div>

<script>

function activateCore(){

    const portal = document.getElementById("portalScreen");
    const effect = document.getElementById("portalEffect");
    const flash = document.getElementById("flash");

    // start portal animation
    effect.classList.add("active");
    portal.classList.add("active");

    // screen shake
    document.body.style.animation = "shake 0.4s";

    // hide portal
    setTimeout(()=>{
        portal.style.display="none";
    },700);

    // show login
    setTimeout(()=>{
        document.getElementById("loginBox").style.display="block";
    },1200);
}

/* SHOW PASSWORD CORE */
function togglePassword(){
    const pass = document.getElementById("password");
    const toggle = document.querySelector(".quantum-toggle");
    const text = document.getElementById("toggleText");

    if(pass.type==="password"){
        pass.type="text";
        toggle.classList.add("active");
        text.innerText="CORE ACTIVE";
    }else{
        pass.type="password";
        toggle.classList.remove("active");
        text.innerText="LOCKED";
    }
}

/* LOGIN */
function login(){
    const user=document.getElementById("username").value;
    const pass=document.getElementById("password").value;

    if(user==="quantum" && pass==="Access_Portal"){
        localStorage.setItem("quantum_user",user);
        localStorage.setItem("login_time",new Date().toLocaleString());
        window.location.href="dashboard.html";
    }else{
        alert("Invalid Credentials");
    }
}

</script>

</body>
</html>
