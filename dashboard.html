<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Valley Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="ai.html">Artificial Intelligence</a>
    <a href="cybersecurity.html">Cybersecurity</a>
    <a href="cloud.html">Cloud Computing</a>
    <a href="data.html">Data & Analytics</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
</nav>

<header>
<h1>Quantum Valley Members Area</h1>
<p class="tagline">Authorized Access Granted</p>
</header>

<section>
<h2>Welcome</h2>
<p>
You have successfully accessed the protected Quantum System.
Only logged-in users can see this page.
</p>
    <div id="profileBox" style="
padding:15px;
border:1px solid #1e293b;
width:320px;
border-radius:12px;
margin-top:20px;
background:#020617;
color:#22d3ee;">
</div>

<button onclick="logout()" style="
padding:12px 22px;
background:#ef4444;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
font-weight:600;">
Logout
</button>

</section>

<script>

/* protect page */
window.onload = function(){

    const user = localStorage.getItem("quantum_user");

    if(!user){
        alert("Unauthorized Access! Please login first.");
        window.location.href = "login.html";
        return;
    }

    // show profile info
    const loginTime = localStorage.getItem("login_time");

    document.getElementById("profileBox").innerHTML =
    `
    <h3>User Profile</h3>
    <p><b>Username:</b> ${user}</p>
    <p><b>Login Time:</b> ${loginTime}</p>
    `;
};

/* logout */
function logout(){
    localStorage.removeItem("quantum_user");
    localStorage.removeItem("login_time");
    window.location.href = "login.html";
}

</script>

</body>
</html>
