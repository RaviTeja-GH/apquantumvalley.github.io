<script>

/* Open login box when core is clicked */
function activateCore(){
    document.getElementById("loginBox").style.display = "block";
}

/* Quantum show / hide password */
function togglePassword(){
    const pass = document.getElementById("password");
    const toggle = document.querySelector(".quantum-toggle");
    const text = document.getElementById("toggleText");

    if(pass.type === "password"){
        pass.type = "text";
        toggle.classList.add("active");
        text.innerText = "CORE ACTIVE";
    }else{
        pass.type = "password";
        toggle.classList.remove("active");
        text.innerText = "LOCKED";
    }
}

/* Real login validation */
function loginCheck(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const correctUser = "quantum";
    const correctPass = "valley123";

    if(username === correctUser && password === correctPass){

        // save session
        localStorage.setItem("quantum_user","loggedin");

        // success message
        document.getElementById("successMsg").style.display = "block";
        document.getElementById("errorMsg").style.display = "none";

        // redirect to dashboard
        setTimeout(function(){
            window.location.href = "dashboard.html";
        }, 1000);

    }else{
        document.getElementById("errorMsg").style.display = "block";
        document.getElementById("successMsg").style.display = "none";
    }
}

</script>
