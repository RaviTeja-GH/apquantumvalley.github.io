<script>

/* wait until page loads */
window.onload = function(){

    if(localStorage.getItem("quantum_user") !== "loggedin"){
        alert("Unauthorized Access! Please login first.");
        window.location.href = "login.html";
    }

};

/* logout */
function logout(){
    localStorage.removeItem("quantum_user");
    window.location.href = "login.html";
}

</script>
